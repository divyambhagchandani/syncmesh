name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: fmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: test
        run: cargo test --workspace --all-targets
      - name: doc-test
        run: cargo test --workspace --doc
      # Build the release binary for this OS and confirm it actually starts.
      # Catches the "we shipped a binary that doesn't even run" class of
      # regression — e.g. a missing system lib, a panic on startup, a
      # version-string regression — that pure-Rust unit/integration tests
      # would never see because they link to the same crate, not the
      # standalone exe.
      - name: build release binary
        run: cargo build --release --bin syncmesh --locked
      - name: smoke test built binary
        shell: bash
        run: |
          set -eu
          if [ "${{ runner.os }}" = "Windows" ]; then
            BIN=target/release/syncmesh.exe
          else
            BIN=target/release/syncmesh
          fi
          # --version and --help must each exit 0 and produce non-empty
          # output. Both are pure-CLI paths — no network, no mpv, no UI.
          out=$("$BIN" --version)
          test -n "$out" || { echo "syncmesh --version produced no output"; exit 1; }
          echo "$out"
          out=$("$BIN" --help)
          test -n "$out" || { echo "syncmesh --help produced no output"; exit 1; }
