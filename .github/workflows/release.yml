name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (must already exist)"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  # Release builds should be deterministic; pin the exact tag that triggered us.
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            use_zigbuild: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            use_zigbuild: true
          - target: x86_64-apple-darwin
            os: macos-latest
            use_zigbuild: false
          - target: aarch64-apple-darwin
            os: macos-latest
            use_zigbuild: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            use_zigbuild: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}

      - name: install zig (musl targets only)
        if: matrix.use_zigbuild
        uses: mlugg/setup-zig@v2
        with:
          version: "0.13.0"

      - name: install cargo-zigbuild
        if: matrix.use_zigbuild
        run: cargo install --locked cargo-zigbuild

      - name: build
        shell: bash
        run: |
          if [ "${{ matrix.use_zigbuild }}" = "true" ]; then
            cargo zigbuild --release --target ${{ matrix.target }} --locked
          else
            cargo build --release --target ${{ matrix.target }} --locked
          fi

      # macOS signing — only runs if the team provides secrets.
      - name: codesign (macOS)
        if: runner.os == 'macOS' && env.APPLE_SIGNING_IDENTITY != ''
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          BIN=target/${{ matrix.target }}/release/syncmesh
          codesign --sign "$APPLE_SIGNING_IDENTITY" --options runtime --timestamp "$BIN"
          ditto -c -k --keepParent "$BIN" syncmesh.zip
          xcrun notarytool submit syncmesh.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$BIN" || true

      # Windows signing via SignPath.io (free for qualifying open-source
      # projects; see packaging/SETUP.md). Only runs when the org has
      # provisioned the SIGNPATH_API_TOKEN secret and set the
      # SIGNPATH_ORG_ID / SIGNPATH_PROJECT_SLUG variables.
      - name: stage unsigned exe (Windows)
        if: runner.os == 'Windows' && vars.SIGNPATH_ORG_ID != ''
        shell: bash
        run: |
          mkdir -p unsigned
          cp "target/${{ matrix.target }}/release/syncmesh.exe" unsigned/syncmesh.exe

      - name: upload unsigned exe for SignPath
        id: upload-unsigned
        if: runner.os == 'Windows' && vars.SIGNPATH_ORG_ID != ''
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-${{ matrix.target }}
          path: unsigned/syncmesh.exe
          if-no-files-found: error
          retention-days: 1

      - name: SignPath sign
        if: runner.os == 'Windows' && vars.SIGNPATH_ORG_ID != ''
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORG_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: "release-signing"
          github-artifact-id: ${{ steps.upload-unsigned.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: target/${{ matrix.target }}/release/

      - name: package
        shell: bash
        run: |
          set -eu
          BIN_DIR=target/${{ matrix.target }}/release
          OUT_DIR=dist
          mkdir -p "$OUT_DIR"
          if [ "${{ runner.os }}" = "Windows" ]; then
            7z a "$OUT_DIR/syncmesh-${{ env.RELEASE_TAG }}-${{ matrix.target }}.zip" "$BIN_DIR/syncmesh.exe" scripts/syncmesh.lua
          else
            tar -czf "$OUT_DIR/syncmesh-${{ env.RELEASE_TAG }}-${{ matrix.target }}.tar.gz" -C "$BIN_DIR" syncmesh -C ../../../ scripts/syncmesh.lua
          fi

      - name: sha256
        shell: bash
        run: |
          cd dist
          if command -v sha256sum >/dev/null; then
            sha256sum * > SHA256SUMS-${{ matrix.target }}
          else
            shasum -a 256 * > SHA256SUMS-${{ matrix.target }}
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: syncmesh-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: aggregate SHA256SUMS
        run: |
          cd dist
          cat SHA256SUMS-* > SHA256SUMS
          rm SHA256SUMS-*

      - name: create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: dist/*
          draft: true
          generate_release_notes: true

  homebrew-bump:
    name: bump Homebrew tap formula
    needs: release
    runs-on: ubuntu-latest
    # Only runs if the maintainer has set HOMEBREW_TAP (e.g. "owner/homebrew-tap")
    # as a repository variable and provided HOMEBREW_TAP_TOKEN (a PAT with
    # write access to the tap repo) as a secret.
    if: vars.HOMEBREW_TAP != ''
    steps:
      - name: bump formula
        uses: dawidd6/action-homebrew-bump-formula@v4
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          tap: ${{ vars.HOMEBREW_TAP }}
          formula: syncmesh
          tag: ${{ github.event.inputs.tag || github.ref_name }}
          no_fork: true
