[package]
name = "syncmesh"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
description = "P2P mesh-based Syncplay alternative for mpv."

[lints]
workspace = true

[lib]
name = "syncmesh"
path = "src/lib.rs"

[[bin]]
name = "syncmesh"
path = "src/main.rs"

[dependencies]
syncmesh-core = { path = "../../crates/syncmesh-core" }
syncmesh-net = { path = "../../crates/syncmesh-net" }
syncmesh-player = { path = "../../crates/syncmesh-player" }
tokio = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt", "json"] }
tracing-appender = "0.2"
clap = { version = "4", features = ["derive"] }
directories = "5"
anyhow = "1"
iroh = { version = "0.98", default-features = false, features = ["tls-ring"] }
postcard = { workspace = true }
ratatui = "0.28"
crossterm = { version = "0.28", features = ["event-stream"] }
arboard = { version = "3", optional = true }
qrcode = { version = "0.14", default-features = false, optional = true }
serde = { workspace = true }
toml = "0.8"
futures = "0.3"

[dev-dependencies]
tempfile = "3"

[features]
default = ["clipboard"]
clipboard = ["dep:arboard"]
qr = ["dep:qrcode"]
